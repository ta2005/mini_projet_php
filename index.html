<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
*, *::before, *::after {
    /* This stops padding from making boxes wider than you set them */
    margin: 0;
    padding: 0;
}

	body{
	    display:flex;
	    justify-content:center;
	    align-items:center;
	    font-family:sans-serif;
	}

	form{
	    margin:0px auto;
	}

	input{
	    margin:8px 0;
	}
	.note{
	    font-size:8px;
	    margin-top:-8px;
	    margin-bottom:8px;
	}

	button{
	    padding:5px;
	    background-color:blue;
	    border-radius:5px;
	    color:white;
	}
	</style>
    </head>
    <body>
	<form method="POST" action="login.php">
	    <label for="user_name">  
		<p>username</p>
		<input type="text" name="user" id="user_name" placeholder="Enter email">
		<p class="note">never share you user name</p>
	    </label>
	    <label for="pwd">
		<p>Password</p>
		<input type="password" name="pwd" id="pwd" placeholder="Password">
	    </label>
	    <p><button type="submit">Login</button></p>

	</form>
    </body>
</html>
